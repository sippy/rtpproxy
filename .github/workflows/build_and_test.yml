# This workflow builds, tests, and publishes Python artifacts.

name: Build, Test & Publish

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  build_test_python:
    name: 'Build&Test: Python'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14-dev']
        compiler: ['gcc', 'clang']
        os: [macos, ubuntu]
        include:
          - python-version: '3.10'
            compiler: microsoft
            os: windows
          - python-version: '3.11'
            compiler: microsoft
            os: windows
          - python-version: '3.12'
            compiler: microsoft
            os: windows
          - python-version: '3.13'
            compiler: microsoft
            os: windows
          - python-version: '3.14-dev'
            compiler: microsoft
            os: windows

    runs-on: ${{ matrix.os }}-latest
    env:
      COMPILER: ${{ matrix.compiler }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel pytest
      shell: bash

    - name: build (linux)
      if: matrix.os == 'ubuntu'
      run: CC=${COMPILER} LDSHARED="${COMPILER} -shared" python setup.py sdist build
      shell: bash

    - name: build (macos)
      if: matrix.os == 'macos'
      run: CC=${COMPILER} python setup.py sdist build
      shell: bash

    - name: build (windows)
      if: matrix.os == 'windows'
      run: python setup.py sdist build
      shell: bash

    - name: install
      run: pip install dist/*
      shell: bash

    - name: test
      run: python -m pytest -q python/test_lossyqueue.py
      shell: bash

  build_test_c:
    name: 'Build&Test: C API'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      shell: bash

    - name: Build
      run: cmake --build build --config Debug --parallel
      shell: bash

    - name: Test
      run: |
        ctest --test-dir build --build-config Debug --output-on-failure
        ./build/spmc_bench_test
      shell: bash

  benchmark_pgo_c:
    name: 'Benchmark: C API PGO'
    needs: [build_test_c]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install benchmark toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm
      shell: bash

    - name: Benchmark baseline vs PGO
      env:
        BENCH_SECONDS: 5
      run: scripts/build/benchmark_pgo.sh
      shell: bash

  build_wheels:
    name: Build Python Wheels
    permissions:
      packages: write
    needs: [build_test_python, build_test_c]
    uses: sippy/cimagic/.github/workflows/BuildPythonWheels.yml@v2
    with:
      ghcr_repo: ${{ github.repository_owner }}/rtqueue

  publish_all_wheels:
    name: Publish Python Wheels
    runs-on: ubuntu-latest
    needs: build_wheels
    environment:
      name: pypi
      url: https://pypi.org/p/spmcqueue
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v6

    - name: Download all wheel artifacts
      uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: 'dist-*'
        merge-multiple: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade build setuptools wheel

    - name: build
      run: python setup.py sdist

    - name: Publish package distributions to PyPI
      if: github.event_name == 'release' && github.event.action == 'published'
      uses: pypa/gh-action-pypi-publish@release/v1

  roll_release:
    name: Release
    needs: publish_all_wheels
    permissions:
      contents: write
    uses: sippy/cimagic/.github/workflows/RollReleaseDraft.yml@v2
